<!DOCTYPE html>
<html>
<head>
    <title>Prueba TácticoMarket - Botones</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #111; color: white; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #6b8c3a; border: none; color: white; border-radius: 5px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border: 1px solid #6b8c3a; z-index: 1000; }
        .modal.open { display: block; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.open { display: block; }
    </style>
</head>
<body>
    <h1>TácticoMarket - Prueba de botones</h1>
    <button id="registerBtn">🎖️ REGISTRARSE</button>
    <button id="walletBtn">💰 Billetera</button>
    <button id="logoutBtn">🚪 Salir</button>
    <div id="mensaje"></div>

    <!-- Modal de registro simplificado -->
    <div class="overlay" id="modalOverlay"></div>
    <div class="modal" id="registerModal">
        <h2>Registro Militar</h2>
        <p>Ingresá tu legajo (cualquier número de 6 dígitos) y el código 123456</p>
        <input type="text" id="legajo" placeholder="Legajo" style="width:100%; padding:8px; margin:5px 0;">
        <input type="text" id="code" placeholder="Código SMS" style="width:100%; padding:8px; margin:5px 0;">
        <button id="verifyBtn">Verificar</button>
        <button id="closeModal">Cerrar</button>
    </div>

    <script>
        // Limpiar localStorage para evitar conflictos
        // localStorage.clear(); // (opcional, descomentar si hay datos corruptos)

        const registerBtn = document.getElementById('registerBtn');
        const walletBtn = document.getElementById('walletBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const modal = document.getElementById('registerModal');
        const overlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const verifyBtn = document.getElementById('verifyBtn');
        const mensaje = document.getElementById('mensaje');

        function showMessage(msg) {
            mensaje.innerHTML = msg;
            setTimeout(() => mensaje.innerHTML = '', 3000);
        }

        registerBtn.onclick = () => {
            modal.classList.add('open');
            overlay.classList.add('open');
        };
        closeModal.onclick = () => {
            modal.classList.remove('open');
            overlay.classList.remove('open');
        };
        overlay.onclick = closeModal.onclick;

        verifyBtn.onclick = () => {
            const legajo = document.getElementById('legajo').value;
            const code = document.getElementById('code').value;
            if (code === '123456') {
                showMessage('✅ Registro exitoso. Guardando usuario...');
                localStorage.setItem('tacticoUser', JSON.stringify({ grade: 'Soldado', points: 500 }));
                modal.classList.remove('open');
                overlay.classList.remove('open');
                alert('Usuario registrado. Ahora podés usar la plataforma.');
            } else {
                showMessage('❌ Código incorrecto. Usá 123456');
            }
        };

        walletBtn.onclick = () => {
            let user = localStorage.getItem('tacticoUser');
            if (user) alert('💰 Billetera: $0. Puntos: 500');
            else alert('Primero registrate');
        };

        logoutBtn.onclick = () => {
            localStorage.removeItem('tacticoUser');
            showMessage('Sesión cerrada');
            alert('Sesión cerrada');
        };
    </script>
</body>
</html>
