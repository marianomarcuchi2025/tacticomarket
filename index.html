<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>TácticoMarket | Marketplace Militar Argentina</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#070a0e; --surface:#0d1117; --surface2:#111920; --surface3:#162030;
      --border:#1e3040; --border2:#2a4560;
      --gold:#c9922a; --gold2:#f0b940; --gold-glow:rgba(201,146,42,0.22);
      --green:#2aff8f; --green-dim:#1a9958;
      --red:#ff3b5c; --cyan:#00d4ff; --cyan-dim:#0a7fa0;
      --text:#c8dce8; --text-dim:#4e6a7a; --text-bright:#f0f8ff;
      --bb: 'Bebas Neue', sans-serif;
      --rj: 'Rajdhani', sans-serif;
      --mo: 'Share Tech Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--rj); overflow-x:hidden; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px),
                        repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px);
    }

    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes pulse2  { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes slide   { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin6   { 0%,90%,100%{transform:rotate(0deg)} 95%{transform:rotate(360deg)} }
    @keyframes toastIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastOut{ from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(20px)} }
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }

    input, textarea, button { font-family:var(--rj); }
    input:focus, textarea:focus { outline:none; }
    button { cursor:pointer; border:none; background:none; }
  </style>
</head>
<body>

<div id="root"></div>

<script>
  (function() {
    // ---------- DOM helpers ----------
    function createElement(tag, attrs, ...children) {
      const el = document.createElement(tag);
      if (attrs) Object.assign(el, attrs);
      children.forEach(child => {
        if (typeof child === 'string') el.appendChild(document.createTextNode(child));
        else if (child) el.appendChild(child);
      });
      return el;
    }

    // ---------- Toast system ----------
    let activeToast = null;
    function showToast(msg) {
      if (activeToast) activeToast.remove();
      const toast = document.createElement('div');
      toast.textContent = msg;
      Object.assign(toast.style, {
        position: 'fixed', bottom: '1.5rem', right: '1.5rem', zIndex: 9999,
        background: 'var(--surface2)', border: '1px solid var(--green-dim)', borderRadius: '10px',
        padding: '10px 18px', fontFamily: "'Share Tech Mono', monospace", fontSize: '13px',
        color: 'var(--green)', pointerEvents: 'none', animation: 'toastIn 0.3s ease forwards'
      });
      document.body.appendChild(toast);
      activeToast = toast;
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
        if (activeToast === toast) activeToast = null;
      }, 2800);
    }

    // ---------- Data ----------
    const products = [
      { id:1, name:"Campera Reglamentaria",  emoji:"🎽", seller:"Sgt. Rodríguez",  branch:"Ejército", price:"$18.500", badge:"hot",  xp:12 },
      { id:2, name:"Tablet Samsung A8",      emoji:"💻", seller:"Cap. Méndez",     branch:"FAA",      price:"$95.000", badge:"new",  xp:20 },
      { id:3, name:"Moto Honda CB190",       emoji:"🏍️", seller:"Tte. García",    branch:"Armada",   price:"$420.000",badge:"hot",  xp:50 },
      { id:4, name:"Reloj Casio G-Shock",    emoji:"⌚", seller:"Cabo Torres",    branch:"Ejército", price:"$62.000", badge:"new",  xp:15 },
      { id:5, name:"Silla Gamer Ergonómica", emoji:"🪑", seller:"Personal Civil", branch:"EMGE",     price:"$115.000",badge:null,   xp:18 },
    ];
    const ranking = [
      { pos:1, name:"Cnel. Martínez", branch:"EJERCITO", xp:"9.840", emoji:"🪖", medal:"🥇" },
      { pos:2, name:"Cap. Romero",    branch:"ARMADA",   xp:"8.210", emoji:"⚓", medal:"🥈" },
      { pos:3, name:"Tte. Suárez",    branch:"FAA",      xp:"7.650", emoji:"✈️", medal:"🥉" },
      { pos:4, name:"Lic. Fernández", branch:"CIVIL",    xp:"6.990", emoji:"👔", medal:"4"  },
      { pos:5, name:"Sgt. Díaz",      branch:"EJERCITO", xp:"5.820", emoji:"🪖", medal:"5"  },
    ];
    const missions = [
      { label:"👁️ Ver 3 productos",   xp:10, pct:0  },
      { label:"🤝 Unirte a un grupo", xp:25, pct:0  },
      { label:"📤 Compartir código",  xp:15, pct:0  },
      { label:"💬 Escribir reseña",   xp:20, pct:0  },
    ];
    const groups = [
      { name:"📦 Kit Camping Táctico",      price:"$42.000", orig:"$68.000", pct:72, members:18, total:25, hours:"48:00:00" },
      { name:"💊 Vitaminas y suplementos",  price:"$28.500", orig:"$45.000", pct:40, members:8,  total:20, hours:"12:30:00" },
    ];
    const trends = [
      { rank:1, name:"Electrónica",    pct:"↑ 34%" },
      { rank:2, name:"Vehículos",      pct:"↑ 28%" },
      { rank:3, name:"Indumentaria",   pct:"↑ 19%" },
      { rank:4, name:"Servicios hogar",pct:"↑ 15%" },
      { rank:5, name:"Alimentos",      pct:"↑ 11%" },
    ];
    const services = [
      { icon:"💼", name:"Asesoría contable FFAA", desc:"Liquidación de haberes, AFIP y declaración jurada para personal uniformado.", price:"$8.000 / sesión" },
      { icon:"🔧", name:"Reparación electrónica",  desc:"Celulares, notebooks y tablets. Garantía 90 días. Retiro en base.", price:"Desde $3.500" },
      { icon:"🚗", name:"Traslados y fletes",      desc:"Mudanzas internas, traslados de unidad a unidad. Todo el país.", price:"Presupuesto gratis" },
    ];
    const stories = [
      { text:"Vendí mi moto en 3 días dentro de la comunidad. Sin intermediarios. El grupo de compras me ahorró 30%.", name:"Sargento Pérez", rank:"Ejército · 12 años", emoji:"🪖" },
      { text:"Ofrezco servicios de plomería para compañeros. Ya generé $180.000 extra este mes solo desde TácticoMarket.", name:"Cabo Vidal", rank:"Armada · 8 años", emoji:"⚓" },
    ];

    let currentFilter = "Todo";
    let currentUser = null; // placeholder

    // ---------- Components ----------
    function XpBar(pct) {
      return createElement('div', { style: { background: 'var(--bg)', borderRadius: 4, height: 6, overflow: 'hidden' } },
        createElement('div', { style: { height: '100%', borderRadius: 4, background: 'linear-gradient(90deg,var(--gold),var(--gold2))', width: `${pct}%`, transition: 'width 1.2s ease' } })
      );
    }

    function ProgressBar(pct, color = 'linear-gradient(90deg,var(--green-dim),var(--green))') {
      return createElement('div', { style: { background: 'var(--bg)', borderRadius: 4, height: 8, overflow: 'hidden', position: 'relative' } },
        createElement('div', { style: { height: '100%', borderRadius: 4, background: color, width: `${pct}%`, position: 'relative', overflow: 'hidden' } },
          createElement('div', { style: { position: 'absolute', inset: 0, background: 'linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent)', animation: 'slide 1.6s ease-in-out infinite' } })
        )
      );
    }

    function Badge({ type }) {
      const map = {
        hot:  { bg:"rgba(255,59,92,.18)",  border:"rgba(255,59,92,.45)",  color:"var(--red)",   label:"HOT"   },
        new:  { bg:"rgba(0,212,255,.15)",  border:"var(--cyan-dim)",      color:"var(--cyan)",  label:"NUEVO" },
      };
      const s = map[type];
      if (!s) return null;
      return createElement('span', { style: { position: 'absolute', top: 8, left: 8, fontFamily: "'Share Tech Mono', monospace", fontSize: 10, padding: '3px 8px', borderRadius: 4, background: s.bg, border: `1px solid ${s.border}`, color: s.color, letterSpacing: 1, zIndex: 1 } }, s.label);
    }

    function ProductCard(p) {
      const div = createElement('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden', cursor: 'pointer', transition: 'all .25s' } });
      div.addEventListener('mouseenter', () => { div.style.transform = 'translateY(-4px)'; div.style.borderColor = 'var(--border2)'; div.style.boxShadow = '0 10px 36px rgba(0,0,0,.45)'; });
      div.addEventListener('mouseleave', () => { div.style.transform = ''; div.style.borderColor = 'var(--border)'; div.style.boxShadow = ''; });
      div.addEventListener('click', () => showToast(`🛒 Cargando: ${p.name}`));
      const topDiv = createElement('div', { style: { height: 130, background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 52, position: 'relative' } }, p.emoji);
      if (p.badge) topDiv.appendChild(Badge({ type: p.badge }));
      const body = createElement('div', { style: { padding: '12px 14px' } });
      body.appendChild(createElement('div', { style: { fontWeight: 700, fontSize: 14, color: 'var(--text-bright)', marginBottom: 4 } }, p.name));
      const sellerSpan = createElement('div', { style: { fontSize: 12, color: 'var(--text-dim)', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 } });
      sellerSpan.appendChild(createElement('span', { style: { width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', display: 'inline-block', boxShadow: '0 0 6px var(--green)' } }));
      sellerSpan.appendChild(document.createTextNode(`${p.seller} · ${p.branch}`));
      body.appendChild(sellerSpan);
      const priceRow = createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } });
      priceRow.appendChild(createElement('span', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: 'var(--gold2)' } }, p.price));
      priceRow.appendChild(createElement('span', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 11, color: 'var(--cyan)', background: 'rgba(0,212,255,.08)', padding: '3px 8px', borderRadius: 4 } }, `+${p.xp} XP`));
      body.appendChild(priceRow);
      div.appendChild(topDiv);
      div.appendChild(body);
      return div;
    }

    function SidebarLeft() {
      const container = createElement('aside', { style: { borderRight: '1px solid var(--border)', padding: '1.25rem 1rem', position: 'sticky', top: 64, height: 'calc(100vh - 64px)', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '1.25rem', zIndex: 1 } });
      // Profile card
      const profileCard = createElement('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, padding: '1.2rem', textAlign: 'center', position: 'relative', overflow: 'hidden' } });
      profileCard.appendChild(createElement('div', { style: { position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: 'linear-gradient(90deg,var(--gold),var(--gold2),var(--gold))', backgroundSize: '200% 100%', animation: 'shimmer 2.5s linear infinite' } }));
      const avatarDiv = createElement('div', { style: { width: 68, height: 68, borderRadius: '50%', background: 'linear-gradient(135deg,var(--gold),var(--gold2))', padding: 3, margin: '0 auto 10px', cursor: 'pointer', transition: 'transform .2s' } });
      avatarDiv.addEventListener('mouseenter', () => avatarDiv.style.transform = 'scale(1.06)');
      avatarDiv.addEventListener('mouseleave', () => avatarDiv.style.transform = 'scale(1)');
      avatarDiv.addEventListener('click', () => showToast('🖌️ Registrá tu legajo para personalizar tu avatar'));
      avatarDiv.appendChild(createElement('div', { style: { width: '100%', height: '100%', borderRadius: '50%', background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 } }, '🪖'));
      profileCard.appendChild(avatarDiv);
      profileCard.appendChild(createElement('div', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 17, letterSpacing: 1, color: 'var(--text-bright)' } }, 'OPERATIVO'));
      profileCard.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 11, color: 'var(--gold)', letterSpacing: 2, marginBottom: 10 } }, '⭐ RECLUTA · NIVEL 1'));
      profileCard.appendChild(XpBar(0));
      const xpRow = createElement('div', { style: { display: 'flex', justifyContent: 'space-between', fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: 'var(--text-dim)', marginTop: 4, marginBottom: 12 } });
      xpRow.appendChild(createElement('span', {}, '0 XP'));
      xpRow.appendChild(createElement('span', {}, '100 XP'));
      profileCard.appendChild(xpRow);
      const statsGrid = createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 } });
      [["$0","Comisiones"],["0","Ventas"],["#—","Ranking"],["0","Misiones"]].forEach(([v,l]) => {
        const cell = createElement('div', { style: { background: 'var(--surface3)', borderRadius: 8, padding: '8px', textAlign: 'center' } });
        cell.appendChild(createElement('span', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 19, color: 'var(--gold2)', display: 'block' } }, v));
        cell.appendChild(createElement('span', { style: { fontSize: 10, letterSpacing: 1, color: 'var(--text-dim)', textTransform: 'uppercase' } }, l));
        statsGrid.appendChild(cell);
      });
      profileCard.appendChild(statsGrid);
      const registerBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: 'none', borderRadius: 7, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer', transition: 'all .2s', padding: '9px 22px', fontSize: 14, background: 'linear-gradient(135deg,var(--gold),var(--gold2))', color: '#000', width: '100%', justifyContent: 'center' } }, '🪖 Registrarme');
      registerBtn.addEventListener('click', () => showToast('🪖 Ingresá tu número de legajo para registrarte'));
      profileCard.appendChild(registerBtn);
      container.appendChild(profileCard);

      // Streak
      const streakDiv = createElement('div', {});
      streakDiv.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 10, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase', paddingBottom: 8, borderBottom: '1px solid var(--border)', marginBottom: 10 } }, '🔥 RACHA ACTIVA'));
      const streakBox = createElement('div', { style: { background: 'linear-gradient(135deg,rgba(201,146,42,.1),rgba(201,146,42,.04))', border: '1px solid rgba(201,146,42,.28)', borderRadius: 10, padding: '1rem', textAlign: 'center' } });
      streakBox.appendChild(createElement('div', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 52, lineHeight: 1, color: 'var(--gold2)', textShadow: '0 0 30px var(--gold-glow)' } }, '0'));
      streakBox.appendChild(createElement('div', { style: { fontSize: 11, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase' } }, 'Días consecutivos'));
      streakDiv.appendChild(streakBox);
      container.appendChild(streakDiv);

      // Missions
      const missionsDiv = createElement('div', {});
      missionsDiv.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 10, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase', paddingBottom: 8, borderBottom: '1px solid var(--border)', marginBottom: 10 } }, '📋 MISIONES DIARIAS'));
      const missionList = createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } });
      missions.forEach(m => {
        const item = createElement('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', cursor: 'pointer', transition: 'border-color .2s' } });
        item.addEventListener('mouseenter', () => item.style.borderColor = 'var(--border2)');
        item.addEventListener('mouseleave', () => item.style.borderColor = 'var(--border)');
        item.addEventListener('click', () => showToast(`Misión: ${m.label}`));
        const top = createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 } });
        top.appendChild(createElement('span', { style: { fontWeight: 700, fontSize: 13 } }, m.label));
        top.appendChild(createElement('span', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 11, color: 'var(--gold)', background: 'rgba(201,146,42,.1)', padding: '2px 7px', borderRadius: 4 } }, `+${m.xp} XP`));
        item.appendChild(top);
        item.appendChild(ProgressBar(m.pct, 'linear-gradient(90deg,var(--cyan-dim),var(--cyan))'));
        missionList.appendChild(item);
      });
      missionsDiv.appendChild(missionList);
      container.appendChild(missionsDiv);
      return container;
    }

    function SidebarRight() {
      const container = createElement('aside', { style: { borderLeft: '1px solid var(--border)', padding: '1.25rem 1rem', position: 'sticky', top: 64, height: 'calc(100vh - 64px)', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '1.25rem', zIndex: 1 } });
      // Wallet
      const wallet = createElement('div', { style: { background: 'linear-gradient(135deg,var(--surface2),var(--surface3))', border: '1px solid var(--border)', borderRadius: 12, padding: '1.2rem', position: 'relative', overflow: 'hidden' } });
      wallet.appendChild(createElement('div', { style: { position: 'absolute', top: -30, right: -30, width: 100, height: 100, borderRadius: '50%', background: 'radial-gradient(circle,var(--gold)33,transparent 70%)' } }));
      wallet.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 10, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: 4 } }, '// BILLETERA TÁCTICA'));
      wallet.appendChild(createElement('div', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 34, color: 'var(--gold2)', letterSpacing: 1, lineHeight: 1, marginBottom: 12 } }, '$0,00'));
      const btnRow = createElement('div', { style: { display: 'flex', gap: 8, marginBottom: 12 } });
      const chargeBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: '1px solid var(--border2)', borderRadius: 7, background: 'transparent', color: 'var(--text-dim)', padding: '5px 14px', fontSize: 12, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer', flex: 1, justifyContent: 'center' } }, '⬆️ Cargar');
      chargeBtn.addEventListener('click', () => showToast('Registrá tu cuenta para cargar saldo.'));
      const withdrawBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: '1px solid var(--border2)', borderRadius: 7, background: 'transparent', color: 'var(--text-dim)', padding: '5px 14px', fontSize: 12, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer', flex: 1, justifyContent: 'center' } }, '⬇️ Retirar');
      withdrawBtn.addEventListener('click', () => showToast('Registrá tu cuenta para retirar.'));
      btnRow.appendChild(chargeBtn);
      btnRow.appendChild(withdrawBtn);
      wallet.appendChild(btnRow);
      const refDiv = createElement('div', { style: { background: 'var(--surface3)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' } });
      const left = createElement('div', {});
      left.appendChild(createElement('div', { style: { fontSize: 10, letterSpacing: 2, color: 'var(--text-dim)', fontFamily: "'Share Tech Mono', monospace", textTransform: 'uppercase' } }, 'Código referido'));
      left.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 14, color: 'var(--cyan)' } }, '— — — — — —'));
      refDiv.appendChild(left);
      const copyBtn = createElement('button', { style: { background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: 1, color: 'var(--text-dim)', transition: 'color .2s' } }, 'COPIAR');
      copyBtn.addEventListener('click', () => { showToast('✅ Código copiado'); });
      refDiv.appendChild(copyBtn);
      wallet.appendChild(refDiv);
      container.appendChild(wallet);

      // Ranking
      const rankDiv = createElement('div', {});
      rankDiv.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 10, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase', paddingBottom: 8, borderBottom: '1px solid var(--border)', marginBottom: 10 } }, '🏆 RANKING GENERAL'));
      const rankList = createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } });
      ranking.forEach(r => {
        const row = createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 9, padding: '7px 9px', borderRadius: 8, cursor: 'pointer', transition: 'background .2s' } });
        row.addEventListener('mouseenter', () => row.style.background = 'var(--surface2)');
        row.addEventListener('mouseleave', () => row.style.background = '');
        row.appendChild(createElement('span', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 15, width: 22, textAlign: 'center', color: r.pos <= 3 ? (r.pos===1?'#ffd700':r.pos===2?'#c0c0c0':'#cd7f32') : 'var(--text-dim)' } }, r.pos <= 3 ? r.medal : r.pos));
        row.appendChild(createElement('div', { style: { width: 30, height: 30, borderRadius: '50%', background: 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 } }, r.emoji));
        const info = createElement('div', { style: { flex: 1 } });
        info.appendChild(createElement('div', { style: { fontWeight: 700, fontSize: 13, color: 'var(--text)' } }, r.name));
        info.appendChild(createElement('div', { style: { fontSize: 10, color: 'var(--text-dim)', fontFamily: "'Share Tech Mono', monospace", letterSpacing: 1 } }, r.branch));
        row.appendChild(info);
        const xpDiv = createElement('div', { style: { textAlign: 'right' } });
        xpDiv.appendChild(createElement('div', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 15, color: 'var(--gold)' } }, r.xp));
        xpDiv.appendChild(createElement('div', { style: { fontSize: 10, color: 'var(--text-dim)', fontFamily: "'Share Tech Mono', monospace" } }, 'XP'));
        row.appendChild(xpDiv);
        rankList.appendChild(row);
      });
      rankDiv.appendChild(rankList);
      container.appendChild(rankDiv);

      // Donate
      const donateDiv = createElement('div', { style: { background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, padding: '1.2rem' } });
      donateDiv.appendChild(createElement('div', { style: { fontFamily: "'Share Tech Mono', monospace", fontSize: 10, letterSpacing: 3, color: 'var(--text-dim)', textTransform: 'uppercase', paddingBottom: 8, borderBottom: '1px solid var(--border)', marginBottom: 10 } }, '❤️ FONDO SOLIDARIO'));

    }

    function Nav() {
      const nav = createElement('nav', { style: { position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200, background: 'rgba(7,10,14,.93)', backdropFilter: 'blur(20px)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 2rem', height: 64 } });
      const logoDiv = createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none' } });
      const logoIcon = createElement('div', { style: { width: 36, height: 36, background: 'linear-gradient(135deg,var(--gold),var(--gold2))', clipPath: 'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, animation: 'spin6 8s ease-in-out infinite' } }, '⚔️');
      logoDiv.appendChild(logoIcon);
      logoDiv.appendChild(createElement('span', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: 'var(--text-bright)', letterSpacing: 2 } }, 'TÁCTICO', createElement('span', { style: { color: 'var(--gold)' } }, 'MKT')));
      nav.appendChild(logoDiv);
      const links = createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '1.75rem' } });
      ['Productos','Servicios','Grupos','Tendencias','Historias'].forEach((l, i) => {
        const a = createElement('a', { href: '#', style: { color: i===0 ? 'var(--text-bright)' : 'var(--text-dim)', textDecoration: 'none', fontWeight: 600, fontSize: 13, letterSpacing: 1.5, textTransform: 'uppercase', paddingBottom: 4, borderBottom: i===0 ? '2px solid var(--gold)' : '2px solid transparent', transition: 'all .2s' } }, l);
        a.addEventListener('mouseenter', (e) => { a.style.color = 'var(--text-bright)'; a.style.borderBottomColor = 'var(--gold)'; });
        a.addEventListener('mouseleave', (e) => { if(i!==0){ a.style.color = 'var(--text-dim)'; a.style.borderBottomColor = 'transparent'; } });
        a.addEventListener('click', (e) => { e.preventDefault(); showToast(`Sección: ${l}`); });
        links.appendChild(a);
      });
      nav.appendChild(links);
      const rightDiv = createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } });
      const xpDiv = createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 14px', fontFamily: "'Share Tech Mono', monospace", fontSize: 13, color: 'var(--gold2)' } });
      xpDiv.appendChild(createElement('span', { style: { width: 8, height: 8, borderRadius: '50%', background: 'var(--green)', boxShadow: '0 0 8px var(--green)', animation: 'pulse2 2s infinite' } }));
      xpDiv.appendChild(document.createTextNode('⚡ 0 XP'));
      rightDiv.appendChild(xpDiv);
      const notifBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: '1px solid var(--border2)', borderRadius: 7, background: 'transparent', color: 'var(--text-dim)', padding: '5px 14px', fontSize: 12, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer' } }, '🔔');
      notifBtn.addEventListener('click', () => showToast('🔔 No tenés notificaciones'));
      rightDiv.appendChild(notifBtn);
      const regBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: 'none', borderRadius: 7, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer', transition: 'all .2s', padding: '9px 22px', fontSize: 14, background: 'linear-gradient(135deg,var(--gold),var(--gold2))', color: '#000' } }, '🎖️ Registrarse');
      regBtn.addEventListener('click', () => showToast('🎖️ Ingresá tu número de legajo'));
      rightDiv.appendChild(regBtn);
      nav.appendChild(rightDiv);
      return nav;
    }

    // Simulated AI Chat (static, without API)
    function AIChat() {
      const [open, setOpen] = React.useState ? React.useState(false) : { value: false, set: (v) => {} }; // but we'll use plain JS
      let openFlag = false;
      let chatPanel = null;
      function toggle() {
        openFlag = !openFlag;
        if (chatPanel) chatPanel.style.display = openFlag ? 'flex' : 'none';
      }
      function sendMessage() {
        const input = chatPanel.querySelector('.ai-chat-input');
        const msg = input.value.trim();
        if (!msg) return;
        const messagesDiv = chatPanel.querySelector('.ai-chat-messages');
        const userMsg = createElement('div', { style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 8 } }, createElement('div', { style: { maxWidth: '82%', padding: '10px 14px', borderRadius: 10, background: 'linear-gradient(135deg,var(--gold),var(--gold2))', color: '#000', fontSize: 13 } }, msg));
        messagesDiv.appendChild(userMsg);
        input.value = '';
        setTimeout(() => {
          const reply = createElement('div', { style: { display: 'flex', justifyContent: 'flex-start', marginBottom: 8 } }, createElement('div', { style: { maxWidth: '82%', padding: '10px 14px', borderRadius: 10, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--text)', fontSize: 13 } }, 'Gracias por tu consulta. Como asistente simulado, por favor registrate en la plataforma para activar todas las funciones.'));
          messagesDiv.appendChild(reply);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 500);
      }
      const container = createElement('div', {});
      const fab = createElement('div', { style: { position: 'fixed', bottom: 24, right: 24, zIndex: 1000, width: 56, height: 56, borderRadius: '50%', background: 'linear-gradient(135deg,var(--gold),var(--gold2))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, cursor: 'pointer', boxShadow: '0 4px 24px var(--gold)55', transition: 'transform .2s' } }, '⚔️');
      fab.addEventListener('click', toggle);
      container.appendChild(fab);
      chatPanel = createElement('div', { style: { position: 'fixed', bottom: 96, right: 24, zIndex: 999, width: 380, height: 560, borderRadius: 16, background: 'var(--surface)', border: '1px solid var(--border2)', display: 'none', flexDirection: 'column', overflow: 'hidden', boxShadow: '0 20px 60px rgba(0,0,0,.7)', animation: 'fadeUp .3s ease' } });
      // header
      const header = createElement('div', { style: { padding: '14px 18px', background: 'var(--surface2)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 12 } });
      header.appendChild(createElement('div', { style: { width: 38, height: 38, borderRadius: '50%', background: 'linear-gradient(135deg,var(--gold),var(--gold2))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 } }, '⚔️'));
      header.appendChild(createElement('div', {}, createElement('div', { style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 16, letterSpacing: 1, color: 'var(--text-bright)' } }, 'TÁCTICO IA'), createElement('div', { style: { fontSize: 11, color: 'var(--green)', fontFamily: "'Share Tech Mono', monospace", display: 'flex', alignItems: 'center', gap: 5 } }, createElement('span', { style: { width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', display: 'inline-block', animation: 'pulse2 2s infinite' } }), 'OPERATIVO')));
      const closeBtn = createElement('button', { style: { marginLeft: 'auto', background: 'none', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: 18 } }, '✕');
      closeBtn.addEventListener('click', toggle);
      header.appendChild(closeBtn);
      chatPanel.appendChild(header);
      const messagesDiv = createElement('div', { class: 'ai-chat-messages', style: { flex: 1, overflowY: 'auto', padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 12 } });
      const welcome = createElement('div', { style: { display: 'flex', justifyContent: 'flex-start' } }, createElement('div', { style: { maxWidth: '82%', padding: '10px 14px', borderRadius: 10, background: 'var(--surface2)', border: '1px solid var(--border)', color: 'var(--text)', fontSize: 13 } }, '¡Bienvenido a TácticoMarket! 🎖️ Soy TÁCTICO IA. Puedo ayudarte a encontrar productos, entender el sistema de rangos, calcular precios de venta o cualquier duda sobre el marketplace. ¿En qué te asisto hoy?'));
      messagesDiv.appendChild(welcome);
      chatPanel.appendChild(messagesDiv);
      const inputRow = createElement('div', { style: { padding: '12px 16px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8 } });
      const inputField = createElement('textarea', { class: 'ai-chat-input', placeholder: 'Escribí tu consulta táctica...', rows: 1, style: { flex: 1, background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, padding: '9px 12px', color: 'var(--text)', fontSize: 13, resize: 'none', outline: 'none', lineHeight: 1.4, fontFamily: "'Rajdhani', sans-serif" } });
      inputField.addEventListener('focus', e => e.target.style.borderColor = 'var(--gold)');
      inputField.addEventListener('blur', e => e.target.style.borderColor = 'var(--border)');
      const sendBtn = createElement('button', { style: { display: 'inline-flex', alignItems: 'center', gap: 7, border: 'none', borderRadius: 7, fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer', transition: 'all .2s', padding: '9px 22px', fontSize: 14, background: 'linear-gradient(135deg,var(--gold),var(--gold2))', color: '#000' } }, '➤');
      sendBtn.addEventListener('click', sendMessage);
      inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
      inputRow.appendChild(inputField);
      inputRow.appendChild(sendBtn);
      chatPanel.appendChild(inputRow);
      container.appendChild(chatPanel);
      return container;
    }

    // Mount everything
    const root = document.getElementById('root');
    const app = createElement('div', { style: { minHeight: '100vh', position: 'relative' } });
    app.appendChild(Nav());
    const mainGrid = createElement('div', { style: { display: 'grid', gridTemplateColumns: '260px 1fr 290px', paddingTop: 64, minHeight: 'calc(100vh - 64px)', position: 'relative', zIndex: 1 } });
    mainGrid.appendChild(SidebarLeft());
    mainGrid.appendChild(Main());
    mainGrid.appendChild(SidebarRight());
    app.appendChild(mainGrid);
    app.appendChild(AIChat());
    root.appendChild(app);
  })();
</script>
</body>
</html>
