<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TácticoMarket — Donaciones</title>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<script src="https://sdk.mercadopago.com/js/v2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c08;color:#f0ede8;font-family:'Barlow',sans-serif}
.container{max-width:800px;margin:50px auto;padding:20px}
.card{background:#1a1f12;border-radius:16px;padding:30px;text-align:center}
.btn{background:#6b8c3a;color:#0a0c08;padding:15px 30px;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px}
.btn:hover{background:#8aaa48}
input,select{background:#111409;border:1px solid #6b8c3a;color:white;padding:10px;border-radius:8px;width:100%;margin-top:5px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0}
.monto-btn{background:rgba(107,140,58,0.2);border:1px solid #6b8c3a;padding:12px;border-radius:12px;cursor:pointer}
.monto-btn.selected{background:#6b8c3a;color:black}
.progress-bar{background:#111409;border-radius:30px;height:12px;margin:15px 0;overflow:hidden}
.progress-fill{background:#6b8c3a;height:100%;width:0%;transition:width 0.5s}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1 style="font-size:48px">💚 TÁCTICO MARKET</h1>
    <h2>Donación voluntaria</h2>
    <p>Elegí el monto para ayudar a mantener la plataforma gratuita</p>
    
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div id="stats">Recaudado: $12.500 / Meta: $500.000</div>
    
    <div class="grid">
      <button class="monto-btn" data-monto="1000">$1.000</button>
      <button class="monto-btn" data-monto="2500">$2.500</button>
      <button class="monto-btn" data-monto="5000">$5.000</button>
      <button class="monto-btn" data-monto="10000">$10.000</button>
      <button class="monto-btn" data-monto="20000">$20.000</button>
      <button class="monto-btn" data-monto="50000">$50.000</button>
    </div>
    
    <input type="number" id="customMonto" placeholder="Otro monto (ARS)">
    <input type="text" id="donanteNombre" placeholder="Tu nombre (opcional)" style="margin-top:10px">
    <input type="text" id="mensaje" placeholder="Mensaje de apoyo (opcional)" style="margin-top:10px">
    
    <button id="donarBtn" class="btn">💚 DONAR CON MERCADO PAGO</button>
    <p style="font-size:11px;margin-top:15px;opacity:0.5">🔒 Pagos seguros. El dinero va directamente a TácticoMarket.</p>
  </div>
</div>

<script>
const MP_PUBLIC_KEY = "APP_USR-46eb8024-b517-4584-9c38-31e2ea0a6d11";
const BACKEND_URL = "https://tacticmarket-backend.onrender.com";

const mp = new MercadoPago(MP_PUBLIC_KEY, { locale: "es-AR" });

let montoSeleccionado = null;

document.querySelectorAll('.monto-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.monto-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    montoSeleccionado = parseInt(btn.dataset.monto);
    document.getElementById('customMonto').value = '';
  };
});

document.getElementById('donarBtn').onclick = async () => {
  let monto = montoSeleccionado;
  const custom = parseInt(document.getElementById('customMonto').value);
  if (custom > 0) monto = custom;
  
  if (!monto || monto < 100) {
    alert("⚠️ El monto mínimo es $100 ARS");
    return;
  }
  
  const nombre = document.getElementById('donanteNombre').value;
  const mensaje = document.getElementById('mensaje').value;
  
  const btn = document.getElementById('donarBtn');
  btn.innerText = "⏳ Procesando...";
  btn.disabled = true;
  
  try {
    const response = await fetch(`${BACKEND_URL}/create-preference`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: monto, donorName: nombre, message: mensaje })
    });
    
    const data = await response.json();
    
    if (data.init_point) {
      window.open(data.init_point, '_blank');
      alert("💚 Redirigiendo a Mercado Pago para completar tu donación.");
    } else {
      alert("❌ Error: " + JSON.stringify(data));
    }
  } catch (error) {
    alert("❌ Error al conectar con el servidor. ¿El backend está activo?\n\n" + error.message);
  }
  
  btn.innerText = "💚 DONAR CON MERCADO PAGO";
  btn.disabled = false;
};

// Verificar backend
fetch(`${BACKEND_URL}/health`)
  .then(r => r.json())
  .then(data => console.log("✅ Backend conectado:", data))
  .catch(e => console.log("❌ Backend no responde:", e));
</script>
</body>
</html>
