<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TácticoMarket — Marketplace Militar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c08;
            color: #f0ede8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .navbar {
            background: #111409;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #6b8c3a;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #6b8c3a;
        }
        button {
            background: #6b8c3a;
            color: #0a0c08;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.2s;
        }
        button:hover {
            background: #8aaa48;
            transform: scale(1.02);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1f12;
            padding: 25px;
            border: 1px solid #6b8c3a;
            border-radius: 12px;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        .modal.open {
            display: block;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
        .overlay.open {
            display: block;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #212918;
            border: 1px solid #6b8c3a;
            color: white;
            border-radius: 6px;
        }
        .producto, .servicio, .grupo {
            background: #1a1f12;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: #1a1f12;
            padding: 15px;
            border-radius: 10px;
        }
        .precio {
            font-size: 24px;
            color: #6b8c3a;
            font-weight: bold;
        }
        .mensaje {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #6b8c3a;
            color: #0a0c08;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 2000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .sidebar {
            background: #111409;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        @media (min-width: 768px) {
            .main-container {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">⚔️ TÁCTICO<span style="color:#c9b99a">MKT</span></div>
    <div>
        <span id="userPointsDisplay" style="margin-right: 15px;">⚡ 0 pts</span>
        <button id="registerBtn">🎖️ REGISTRARSE</button>
        <button id="walletBtn">💰 Billetera</button>
        <button id="logoutBtn" style="display:none;">🚪 Salir</button>
    </div>
</div>

<h2>🔥 Productos destacados</h2>
<div id="listingsContainer" class="grid"></div>

<h2 style="margin-top: 30px;">🛠️ Servicios</h2>
<div id="serviciosContainer" class="grid"></div>

<h2 style="margin-top: 30px;">🤝 Compras grupales</h2>
<div id="gruposContainer"></div>
<button id="crearGrupoBtn" style="margin-bottom: 20px;">➕ Crear grupo</button>

<div class="sidebar">
    <h3>🎖️ Tu perfil</h3>
    <div id="perfilInfo">No registrado</div>
    <hr style="margin: 10px 0; border-color: #6b8c3a;">
    <div><strong>🔗 Código de referido:</strong> <span id="refCode">---</span></div>
    <div><strong>💰 Comisiones:</strong> $<span id="comisiones">0</span></div>
    <div style="margin-top: 10px;"><strong>💰 Donaciones comunitarias:</strong> $<span id="donacionesTotal">0</span> / $500.000</div>
    <button id="donarBtn" style="margin-top: 10px;">❤️ Donar $500</button>
</div>

<!-- MODAL REGISTRO -->
<div class="overlay" id="modalOverlay"></div>
<div class="modal" id="registerModal">
    <h2>Verificación militar</h2>
    <p>Legajos válidos de prueba: EA-123456, EA-789012, AR-111222</p>
    <label>Fuerza</label>
    <select id="forceSelect">
        <option value="EA">🪖 Ejército</option>
        <option value="AR">⚓ Armada</option>
        <option value="FA">✈️ Fuerza Aérea</option>
        <option value="CV">👔 Personal Civil</option>
    </select>
    <input type="text" id="legajoInput" placeholder="Número de legajo (ej: 123456)">
    <button id="sendCodeBtn">📱 Enviar código</button>
    <div id="codigoInfo" style="font-size: 12px; margin-top: 5px;"></div>
    <input type="text" id="codeInput" placeholder="Código de 6 dígitos" style="display:none;">
    <div id="gradosContainer" style="margin-top: 10px;"></div>
    <button id="confirmarRegistroBtn" style="display:none;">✅ Confirmar registro</button>
    <button id="closeModalBtn">Cerrar</button>
</div>

<script>
    // -------------------- DATOS SIMULADOS --------------------
    let currentUser = JSON.parse(localStorage.getItem('tacticoUser')) || null;
    let listings = [
        { id: 1, title: 'Borceguí militar talla 42', price: 18000, emoji: '👢', loc: 'Córdoba', seller: 'Sgt. Pérez' },
        { id: 2, title: 'Uniforme UCA verde oliva', price: 9500, emoji: '🥋', loc: 'Campo Mayo', seller: 'Cb. Martínez' },
        { id: 3, title: 'Mochila táctica 60L', price: 15000, emoji: '🎒', loc: 'Salta', seller: 'Tte. Gómez' }
    ];
    let servicios = [
        { id: 101, title: 'Pintura de interiores', price: 15000, loc: 'Capital Federal', seller: 'Tte. García', duration: '2 días' },
        { id: 102, title: 'Asesoría legal laboral', price: 8000, loc: 'Córdoba', seller: 'Dra. Laura', duration: '1 hora' }
    ];
    let gruposActivos = JSON.parse(localStorage.getItem('gruposActivos')) || [
        { id: 1, producto: 'Botas de combate', precioUnitario: 18000, meta: 5, participantes: 2, descuento: 0.15, imagen: '👢' }
    ];
    let userComisiones = parseInt(localStorage.getItem('userComisiones')) || 0;
    let totalDonations = parseInt(localStorage.getItem('totalDonations')) || 15000;

    // -------------------- FUNCIONES AUXILIARES --------------------
    function showMessage(msg) {
        let div = document.createElement('div');
        div.className = 'mensaje';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function saveUser(user) {
        localStorage.setItem('tacticoUser', JSON.stringify(user));
        currentUser = user;
        updateUI();
    }

    function updateUI() {
        if (currentUser) {
            document.getElementById('userPointsDisplay').innerHTML = `⚡ ${currentUser.points || 0} pts`;
            document.getElementById('perfilInfo').innerHTML = `${currentUser.grade || 'Militar'} - ${currentUser.force || 'Fuerza'}`;
            document.getElementById('refCode').innerText = currentUser.refCode || '---';
            document.getElementById('comisiones').innerText = userComisiones;
            document.getElementById('registerBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } else {
            document.getElementById('userPointsDisplay').innerHTML = `⚡ 0 pts`;
            document.getElementById('perfilInfo').innerHTML = 'No registrado';
            document.getElementById('refCode').innerText = '---';
            document.getElementById('comisiones').innerText = '0';
            document.getElementById('registerBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
        document.getElementById('donacionesTotal').innerText = totalDonations;
        renderGrupos();
    }

    function addPoints(amount) {
        if (currentUser) {
            currentUser.points = (currentUser.points || 0) + amount;
            saveUser(currentUser);
        }
    }

    // -------------------- COMPRAS (simulación escrow) --------------------
    function comprar(item, tipo) {
        if (!currentUser) {
            alert('Primero regístrate');
            return;
        }
        showMessage(`💰 Compra de ${item.title} por $${item.price}. Dinero retenido. Se liberará en 10s.`);
        addPoints(50);
        setTimeout(() => {
            showMessage(`✅ Pago liberado a ${item.seller} por ${item.title}.`);
        }, 10000);
    }

    function renderListings() {
        const container = document.getElementById('listingsContainer');
        container.innerHTML = listings.map(p => `
            <div class="card">
                <div style="font-size: 48px;">${p.emoji}</div>
                <div><strong>${p.title}</strong></div>
                <div class="precio">$${p.price.toLocaleString()}</div>
                <div>📍 ${p.loc} · ${p.seller}</div>
                <button class="comprarBtn" data-id="${p.id}" style="margin-top: 10px; width: 100%;">Comprar</button>
            </div>
        `).join('');
        document.querySelectorAll('.comprarBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const item = listings.find(p => p.id === id);
                comprar(item, 'producto');
            });
        });
    }

    function renderServicios() {
        const container = document.getElementById('serviciosContainer');
        container.innerHTML = servicios.map(s => `
            <div class="card">
                <div style="font-size: 48px;">🛠️</div>
                <div><strong>${s.title}</strong></div>
                <div class="precio">$${s.price.toLocaleString()}</div>
                <div>📍 ${s.loc} · 🕒 ${s.duration}</div>
                <button class="contratarBtn" data-id="${s.id}" style="margin-top: 10px; width: 100%;">Contratar</button>
            </div>
        `).join('');
        document.querySelectorAll('.contratarBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const item = servicios.find(s => s.id === id);
                comprar(item, 'servicio');
            });
        });
    }

    function renderGrupos() {
        const container = document.getElementById('gruposContainer');
        if (!container) return;
        if (gruposActivos.length === 0) {
            container.innerHTML = '<div>No hay grupos activos. ¡Creá uno!</div>';
            return;
        }
        container.innerHTML = gruposActivos.map(g => `
            <div class="producto">
                <div><span style="font-size: 28px;">${g.imagen}</span> <strong>${g.producto}</strong></div>
                <div>Precio normal: $${g.precioUnitario.toLocaleString()}</div>
                <div>Precio grupal (${g.descuento*100}% off): $${Math.round(g.precioUnitario * (1 - g.descuento)).toLocaleString()}</div>
                <div>Participantes: ${g.participantes} / ${g.meta}</div>
                <button class="unirseGrupoBtn" data-id="${g.id}">Sumarme</button>
            </div>
        `).join('');
        document.querySelectorAll('.unirseGrupoBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const grupo = gruposActivos.find(g => g.id === id);
                if (grupo && currentUser) {
                    grupo.participantes++;
                    localStorage.setItem('gruposActivos', JSON.stringify(gruposActivos));
                    renderGrupos();
                    showMessage(`✅ Te sumaste al grupo para ${grupo.producto}.`);
                    addPoints(30);
                } else {
                    alert('Regístrate primero');
                }
            });
        });
    }

    // -------------------- REGISTRO (SIMPLIFICADO) --------------------
    let tempCode = '';

    function initRegistro() {
        const modal = document.getElementById('registerModal');
        const overlay = document.getElementById('modalOverlay');
        const openBtn = document.getElementById('registerBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const codeInput = document.getElementById('codeInput');
        const codigoInfo = document.getElementById('codigoInfo');
        const gradosContainer = document.getElementById('gradosContainer');
        const confirmarBtn = document.getElementById('confirmarRegistroBtn');
        const legajoInput = document.getElementById('legajoInput');
        const forceSelect = document.getElementById('forceSelect');

        openBtn.onclick = () => {
            modal.classList.add('open');
            overlay.classList.add('open');
            legajoInput.value = '';
            codeInput.style.display = 'none';
            codeInput.value = '';
            codigoInfo.innerText = '';
            gradosContainer.innerHTML = '';
            confirmarBtn.style.display = 'none';
        };
        closeBtn.onclick = () => {
            modal.classList.remove('open');
            overlay.classList.remove('open');
        };
        overlay.onclick = closeBtn.onclick;

        sendCodeBtn.onclick = () => {
            const legajo = legajoInput.value.trim();
            const force = forceSelect.value;
            if (!legajo || legajo.length < 4) {
                alert('Ingresá un legajo válido (mínimo 4 dígitos)');
                return;
            }
            tempCode = Math.floor(100000 + Math.random() * 900000).toString();
            codigoInfo.innerText = `📱 Código de prueba: ${tempCode}`;
            codeInput.style.display = 'block';
            codeInput.value = '';
            codeInput.focus();
        };

        const verificarCodigo = () => {
            if (codeInput.value === tempCode) {
                gradosContainer.innerHTML = `
                    <label>Grado (opcional)</label>
                    <select id="gradoSelect">
                        <option value="Prefiero no decirlo">🙈 Prefiero no decirlo</option>
                        <option value="Soldado Voluntario">Soldado Voluntario</option>
                        <option value="Cabo">Cabo</option>
                        <option value="Sargento">Sargento</option>
                        <option value="Teniente">Teniente</option>
                        <option value="Capitán">Capitán</option>
                    </select>
                `;
                confirmarBtn.style.display = 'block';
                codeInput.removeEventListener('change', verificarCodigo);
            } else {
                alert('Código incorrecto');
            }
        };

        codeInput.addEventListener('change', verificarCodigo);

        confirmarBtn.onclick = () => {
            const gradoSelect = document.getElementById('gradoSelect');
            const grado = gradoSelect ? gradoSelect.value : 'Prefiero no decirlo';
            const legajoValue = document.getElementById('legajoInput').value;
            const isAdmin = (legajoValue === 'TacticoAdmin2026');
            const newUser = {
                grade: grado,
                force: forceSelect.options[forceSelect.selectedIndex].text,
                points: isAdmin ? 999999 : 500,
                refCode: 'TACTICO-' + Math.random().toString(36).substring(2,8).toUpperCase(),
                isAdmin: isAdmin
            };
            saveUser(newUser);
            modal.classList.remove('open');
            overlay.classList.remove('open');
            showMessage(`✅ Registro exitoso. ${isAdmin ? 'Bienvenido Admin' : '¡Bienvenido!'}`);
            updateUI();
        };
    }

    // -------------------- DONACIONES Y OTROS --------------------
    document.getElementById('walletBtn').onclick = () => {
        alert(`💰 Billetera: $${userComisiones} ARS\nPuntos: ${currentUser?.points || 0}`);
    };
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('tacticoUser');
        currentUser = null;
        updateUI();
        showMessage('Sesión cerrada');
    };
    document.getElementById('donarBtn').onclick = () => {
        totalDonations += 500;
        localStorage.setItem('totalDonations', totalDonations);
        updateUI();
        showMessage('💚 ¡Gracias por donar $500!');
    };
    document.getElementById('crearGrupoBtn').onclick = () => {
        if (!currentUser) {
            alert('Regístrate primero');
            return;
        }
        const producto = prompt('¿Qué producto?');
        if (!producto) return;
        const precio = parseFloat(prompt('Precio normal?'));
        if (isNaN(precio)) return;
        const meta = parseInt(prompt('Cantidad de personas necesarias?'));
        if (isNaN(meta)) return;
        gruposActivos.push({
            id: Date.now(),
            producto,
            precioUnitario: precio,
            meta,
            participantes: 1,
            descuento: 0.15,
            imagen: '📦'
        });
        localStorage.setItem('gruposActivos', JSON.stringify(gruposActivos));
        renderGrupos();
        showMessage('Grupo creado');
    };

    // -------------------- INICIALIZACIÓN --------------------
    function init() {
        renderListings();
        renderServicios();
        renderGrupos();
        updateUI();
        initRegistro();
    }
    init();
</script>
</body>
</html>
